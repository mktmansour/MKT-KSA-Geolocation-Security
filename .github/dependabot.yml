version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
      - "security"
    groups:
      cargo-nonsecurity:
        patterns:
          - "*"
        applies-to: "version-updates"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:30"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "rust"
      - "lockfile"
    commit-message:
      prefix: "chore"
    lockfile-maintenance:
      enabled: true
