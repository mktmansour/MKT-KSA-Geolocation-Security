name: Security Profile Matrix Smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  profile-smoke:
    name: Smoke ${{ matrix.security_profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        security_profile: [strict, ultra-strict]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Prepare secure workspace
        uses: ./.github/actions/secure-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --locked --release

      - name: Run profile smoke checks
        env:
          SECURITY_PROFILE: ${{ matrix.security_profile }}
          DATABASE_URL: sqlite:///tmp/mkt-geo-${{ matrix.security_profile }}.db
          RUST_LOG: warn
        run: |
          set -euo pipefail

          # CI-only placeholders (not real secrets), exported at runtime to avoid secret-scan false positives.
          export API_KEY="ci_test_api_key_not_secret_000000000000"
          export JWT_SECRET="ci_test_jwt_secret_not_secret_0000000000000000"

          cargo run --locked --release > /tmp/mkt-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 40); do
            if curl -sS http://127.0.0.1:8080/api/users/00000000-0000-0000-0000-000000000000 -o /tmp/body.json -D /tmp/headers.txt >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          curl -sS http://127.0.0.1:8080/api/users/00000000-0000-0000-0000-000000000000 \
            -H 'X-Request-ID: ci-smoke-request-id' \
            -D /tmp/headers.txt \
            -o /tmp/body.json

          grep -i '^x-request-id: ci-smoke-request-id' /tmp/headers.txt
          grep -q '"code":"MISSING_API_KEY"' /tmp/body.json

          curl -sS -X POST http://127.0.0.1:8080/api/alerts/trigger \
            -H "X-API-Key: ${API_KEY}" \
            -H 'Content-Type: application/json' \
            -H 'X-Request-ID: ci-ai-risk-block' \
            -d '{"entity_id":"00000000-0000-0000-0000-000000000000","entity_type":"user","alert_type":"intrusion","severity":"high","details":{"payload":"<script>alert(1)</script> union select * from users"}}' \
            -D /tmp/ai_headers.txt \
            -o /tmp/ai_body.json >/dev/null

          grep -q '^HTTP/1.1 403' /tmp/ai_headers.txt
          grep -i '^retry-after:' /tmp/ai_headers.txt
          grep -q '"code":"AI_RISK_BLOCKED"' /tmp/ai_body.json

          rl_ok=0
          for _ in $(seq 1 220); do
            curl -sS http://127.0.0.1:8080/api/users/00000000-0000-0000-0000-000000000000 \
              -D /tmp/rl_headers.txt \
              -o /tmp/rl_body.json >/dev/null
            if grep -q '^HTTP/1.1 429' /tmp/rl_headers.txt; then
              rl_ok=1
              break
            fi
          done

          test "$rl_ok" -eq 1
          grep -i '^retry-after:' /tmp/rl_headers.txt
          grep -q '"code":"RATE_LIMIT_EXCEEDED"' /tmp/rl_body.json

          kill "$server_pid"
          wait "$server_pid" 2>/dev/null || true
          trap - EXIT
