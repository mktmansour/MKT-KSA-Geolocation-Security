<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="Request lifecycle">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #143a56; }
      .step { fill: #f8fcff; stroke: #6ea7cf; stroke-width: 2; rx: 14; }
      .h { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #143a56; }
      .t { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #234d6e; }
      .edge { stroke: #3f7fae; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#3f7fae"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="#eef6fd"/>
  <text x="700" y="60" text-anchor="middle" class="title">Request Lifecycle - Security Path</text>

  <rect x="90" y="190" width="180" height="180" class="step"/>
  <text x="180" y="235" text-anchor="middle" class="h">01</text>
  <text x="180" y="268" text-anchor="middle" class="t">Ingress</text>
  <text x="180" y="298" text-anchor="middle" class="t">HTTP Route</text>

  <rect x="320" y="190" width="180" height="180" class="step"/>
  <text x="410" y="235" text-anchor="middle" class="h">02</text>
  <text x="410" y="268" text-anchor="middle" class="t">Validation</text>
  <text x="410" y="298" text-anchor="middle" class="t">Request Trace</text>

  <rect x="550" y="190" width="180" height="180" class="step"/>
  <text x="640" y="235" text-anchor="middle" class="h">03</text>
  <text x="640" y="268" text-anchor="middle" class="t">Auth Gate</text>
  <text x="640" y="298" text-anchor="middle" class="t">API Key + JWT</text>

  <rect x="780" y="190" width="180" height="180" class="step"/>
  <text x="870" y="235" text-anchor="middle" class="h">04</text>
  <text x="870" y="268" text-anchor="middle" class="t">Risk Engine</text>
  <text x="870" y="298" text-anchor="middle" class="t">Policy Check</text>

  <rect x="1010" y="190" width="180" height="180" class="step"/>
  <text x="1100" y="235" text-anchor="middle" class="h">05</text>
  <text x="1100" y="268" text-anchor="middle" class="t">Persistence</text>
  <text x="1100" y="298" text-anchor="middle" class="t">SQLite Path</text>

  <rect x="1240" y="190" width="130" height="180" class="step"/>
  <text x="1305" y="235" text-anchor="middle" class="h">06</text>
  <text x="1305" y="268" text-anchor="middle" class="t">Response</text>
  <text x="1305" y="298" text-anchor="middle" class="t">Trace ID</text>

  <path d="M270 280 L320 280" class="edge"/>
  <path d="M500 280 L550 280" class="edge"/>
  <path d="M730 280 L780 280" class="edge"/>
  <path d="M960 280 L1010 280" class="edge"/>
  <path d="M1190 280 L1240 280" class="edge"/>

  <rect x="220" y="470" width="960" height="190" class="step"/>
  <text x="700" y="520" text-anchor="middle" class="h">Security Guarantees</text>
  <text x="280" y="560" class="t">- Deterministic authorization and deny contracts</text>
  <text x="280" y="590" class="t">- Retry guidance for controlled traffic behavior</text>
  <text x="280" y="620" class="t">- Correlated request logs for incident analysis</text>
</svg>
